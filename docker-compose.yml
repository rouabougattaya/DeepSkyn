services:
  db:
    image: postgres:15-alpine
    container_name: deepskyn-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: skan2001
      POSTGRES_DB: deepskyn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deepskyn-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      CORS_ORIGIN: http://localhost
      FRONTEND_URL: http://localhost
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: deepskyn_db
      DB_USER: postgres
      DB_PASSWORD: skan2001
      DATABASE_URL: postgresql://postgres:skan2001@db:5432/deepskyn_db
      JWT_SECRET: your_super_secret_jwt_key_here_change_in_production_12345
      JWT_ACCESS_SECRET: your_access_secret_key_12345
      JWT_REFRESH_SECRET: your_refresh_secret_key_12345
      JWT_EXPIRES_IN: 24h
      JWT_ISSUER: deepskyn
      GEMINI_API_KEY: AIzaSyBneYSyhP9K3kX5PMMuXnr5eY-a8JbvItY
      GOOGLE_GENAI_API_KEY: AIzaSyBneYSyhP9K3kX5PMMuXnr5eY-a8JbvItY
