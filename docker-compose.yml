    container_name: deepskyn-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  jenkins:
    image: jenkins/jenkins:lts
    container_name: deepskyn-jenkins
    restart: always
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "github.com:140.82.121.3"
      - "api.github.com:140.82.121.3"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Dsun.net.spi.nameservice.nameservers=8.8.8.8 -Dsun.net.spi.nameservice.provider.1=dns,sun

volumes:
  postgres_data:
  jenkins_data: # Ajoutez à la fin de votre docker-compose.yml
networks:
  default:
    name: deepskyn_network
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv4: "true"
      com.docker.network.enable_ipv6: "false"
