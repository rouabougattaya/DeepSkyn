apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepskyn-backend
  namespace: deepskyn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deepskyn-backend
  template:
    metadata:
      labels:
        app: deepskyn-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/deepskyn-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '3001'
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: '5432'
            - name: DB_NAME
              value: deepskyn
            - name: DB_USER
              value: deepskyn
            - name: DB_PASSWORD
              value: deepskyn
          readinessProbe:
            httpGet:
              path: /api/auth/health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/health
              port: 3001
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: deepskyn
  labels:
    app: deepskyn-backend
spec:
  selector:
    app: deepskyn-backend
  ports:
    - port: 3001
      targetPort: 3001
