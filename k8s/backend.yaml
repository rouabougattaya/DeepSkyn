apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: deepskyn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: deepskyn-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "skan2001"
        - name: DB_NAME
          value: "deepskyn_db"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: deepskyn
spec:
  type: NodePort
  selector:
    app: backend
  ports:
  - port: 3001
    targetPort: 3001
    nodePort: 30001
